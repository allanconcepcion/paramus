name: Deploy WP - Mike McKenzie [Staging]
on:
  push:
    branches:      
      - mmckenziestg

jobs:
  deploy:    
    runs-on: ubuntu-latest    
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Sync
        uses: Burnett01/rsync-deployments@4.1
        with:
          switches: -avzr --delete --filter=". ./.rsync-filter"
          path: cms/          
          remote_host: 35.236.219.140
          remote_port: 22985
          remote_path: /www/mikemckenziecms_765/public/wp-content
          remote_user: mikemckenziecms
          remote_key: ${{ secrets.KINSTA_SSH_DEPLOY_PRIVATE_KEY }}